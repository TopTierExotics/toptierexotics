<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TopTierExotics | Private Access Luxury Streetwear</title>

<meta name="description" content="TopTierExotics - Private access luxury streetwear. Worldwide shipping. Limited drops.">
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:3000;
transition:opacity .6s ease;
}
.loader img{
width:150px;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* BURGER */
.burger{
position:fixed;
top:25px;
left:25px;
width:30px;
cursor:pointer;
z-index:2000;
}
.burger div{
height:2px;background:#fff;margin:7px 0;transition:.3s;
}
.burger.active div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.burger.active div:nth-child(2){opacity:0;}
.burger.active div:nth-child(3){transform:rotate(-45deg) translate(6px,-6px);}

/* MENU */
.side-menu{
position:fixed;
top:0;
left:-100%;
width:280px;
height:100%;
background:#050505;
padding:120px 30px;
transition:.4s;
z-index:1500;
}
.side-menu.active{left:0;}
.side-menu a{
display:block;
margin-bottom:25px;
color:#fff;
text-decoration:none;
letter-spacing:2px;
}
.side-menu a:hover{color:#39ff14;}

/* HERO */
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}
.hero-logo{
width:300px;
margin-bottom:20px;
}
.hero p{
letter-spacing:3px;
opacity:.7;
margin-bottom:25px;
}

/* BUTTON */
.primary-btn{
padding:14px 40px;
border-radius:50px;
background:#39ff14;
color:#000;
border:none;
font-weight:600;
cursor:pointer;
transition:.3s;
}
.primary-btn:hover{
transform:scale(1.05);
}

/* PRODUCTS */
.products{
padding:100px 10%;
}
.products h2{
text-align:center;
margin-bottom:60px;
letter-spacing:6px;
font-family:'Playfair Display',serif;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:50px;
max-width:1000px;
margin:auto;
}

.product{
background:#111;
border-radius:20px;
padding:30px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:.3s;
}

.product.show{
opacity:1;
transform:translateY(0);
}

.product-image{
position:relative;
height:250px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

.product-image img{
max-width:100%;
max-height:100%;
cursor:pointer;
}

/* ARROWS */
.arrow{
position:absolute;
bottom:10px;
background:#000;
color:#39ff14;
border:none;
width:30px;height:30px;
border-radius:50%;
}
.arrow-left{left:10px;}
.arrow-right{right:10px;}

/* DOTS */
.gallery-dots{
display:flex;
justify-content:center;
gap:6px;
margin-bottom:15px;
}
.gallery-dots span{
width:6px;height:6px;border-radius:50%;background:#555;
}
.gallery-dots .active{background:#39ff14;}

/* FOOTER */
.footer{
padding:50px;
text-align:center;
}
.footer-icons{
display:flex;
justify-content:center;
gap:30px;
}
.footer-icons img{
width:30px;
}

/* ZOOM */
.zoom{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
}
.zoom img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<div class="loader" id="loader">
<img src="logo.png">
</div>

<div class="burger" id="burger">
<div></div><div></div><div></div>
</div>

<nav class="side-menu" id="menu">
<a href="#home">HOME</a>
<a href="#products">PRODUCTS</a>
<a href="#contact">CONTACT</a>
<a href="https://t.me/TTE_V2" target="_blank">TELEGRAM</a>
</nav>

<section class="hero" id="home">
<img src="logo.png" class="hero-logo">
<p>PRIVATE ACCESS LUXURY STREETWEAR</p>

<button class="primary-btn" onclick="window.open('https://t.me/TTE_V2')">
SHOP COLLECTION
</button>
</section>

<section class="products" id="products">

<h2>FEATURED COLLECTION</h2>

<div class="product-grid">

<!-- HAT -->
<article class="product">

<div class="product-image" id="hatGallery">
<button class="arrow arrow-left" onclick="changeHat(-1)">‹</button>
<img src="hat.png" id="hatImage">
<button class="arrow arrow-right" onclick="changeHat(1)">›</button>
</div>

<div class="gallery-dots" id="hatDots"></div>

<h3>TOPTIEREXOTICS HAT</h3>
<p>Structured fit. Breathable fabric.</p>

<button class="primary-btn" onclick="window.open('https://t.me/TTE_V2')">
ORDER
</button>

</article>

<!-- TRACKSUIT -->
<article class="product">

<div class="product-image" id="tracksuitGallery">
<button class="arrow arrow-left" onclick="changeTracksuit(-1)">‹</button>
<img src="tracksuit.png" id="tracksuitImage">
<button class="arrow arrow-right" onclick="changeTracksuit(1)">›</button>
</div>

<div class="gallery-dots" id="tracksuitDots"></div>

<h3>TOPTIEREXOTICS TRACKSUIT</h3>
<p>Premium hoodie and joggers.</p>

<button class="primary-btn" onclick="window.open('https://t.me/TTE_V2')">
BUY NOW
</button>

</article>

</div>
</section>

<section id="contact" style="text-align:center;padding:80px;">
<p>Contact us via Telegram or Instagram.</p>
</section>

<footer class="footer">

<div class="footer-icons">
<a href="https://t.me/TTE_V2"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a href="https://www.instagram.com/toptierexotics.2k25"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a href="https://www.paypal.me/TopTierExotics"><img src="https://cdn-icons-png.flaticon.com/512/174/174861.png"></a>
</div>

</footer>

<div class="zoom" id="zoom">
<img id="zoomImg">
</div>

<script>

/* SAFE SELECTORS */
const loader=document.getElementById("loader");
const burger=document.getElementById("burger");
const menu=document.getElementById("menu");

/* LOADER */
window.onload=()=>{
setTimeout(()=>loader.style.display="none",700);
};

/* MENU */
burger.onclick=()=>{
menu.classList.toggle("active");
burger.classList.toggle("active");
};

/* REVEAL */
const products=document.querySelectorAll(".product");
window.addEventListener("scroll",()=>{
products.forEach(p=>{
if(p.getBoundingClientRect().top<window.innerHeight*0.85){
p.classList.add("show");
}
});
});

/* GALLERIES */
const hatImages=["hat.png","hat1-back.jpg","hat1-side.jpg"];
let hatIndex=0;
const hatImage=document.getElementById("hatImage");

function changeHat(d){
hatIndex=(hatIndex+d+hatImages.length)%hatImages.length;
hatImage.src=hatImages[hatIndex];
}

const tracksuitImages=["tracksuit.png","tracksuit-back.jpg","tracksuit-side.jpg"];
let tracksuitIndex=0;
const tracksuitImage=document.getElementById("tracksuitImage");

function changeTracksuit(d){
tracksuitIndex=(tracksuitIndex+d+tracksuitImages.length)%tracksuitImages.length;
tracksuitImage.src=tracksuitImages[tracksuitIndex];
}

/* ZOOM */
hatImage.onclick=e=>{zoom.style.display="flex";zoomImg.src=e.target.src;}
tracksuitImage.onclick=e=>{zoom.style.display="flex";zoomImg.src=e.target.src;}
zoom.onclick=()=>zoom.style.display="none";

</script>

</body>
</html>
