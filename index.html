<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TopTierExotics | Private Access Luxury Streetwear</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>

html,body{margin:0;padding:0;background:#000;overflow-x:hidden;}
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Montserrat',sans-serif;
color:#fff;
}

/* CURSOR GLOW */

.cursor{
position:fixed;
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle, rgba(57,255,20,.25), transparent 70%);
pointer-events:none;
z-index:999;
transform:translate(-50%,-50%);
opacity:0;
transition:opacity .3s;
}

/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:3000;
transition:opacity .8s;
}

.loader img{
width:160px;
filter:drop-shadow(0 0 30px rgba(57,255,20,.6));
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.05)}
}

/* BURGER */

.burger{
position:fixed;
top:30px;
left:30px;
width:30px;
cursor:pointer;
z-index:1200;
}

.burger div{
height:2px;
background:#fff;
margin:7px 0;
transition:.28s;
}

.burger.active div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.burger.active div:nth-child(2){opacity:0;}
.burger.active div:nth-child(3){transform:rotate(-45deg) translate(6px,-6px);}

/* MENU */

.side-menu{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#000;
padding:120px 34px;
transition:.32s;
z-index:1100;
overflow:hidden;
}

.menu-main,.menu-socials{
position:absolute;
top:120px;
left:34px;
width:calc(100% - 68px);
transition:.3s;
}

.menu-socials{
left:300px;
}

.side-menu.social-open .menu-main{
left:-300px;
}

.side-menu.social-open .menu-socials{
left:34px;
}

.side-menu a{
display:block;
color:#fff;
text-decoration:none;
margin-bottom:34px;
letter-spacing:3px;
font-size:.95rem;
cursor:pointer;
}

.side-menu a:hover{color:#39ff14;}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero-logo{
width:360px;
max-width:85%;
margin-bottom:30px;
filter:drop-shadow(0 0 40px rgba(57,255,20,.35));
animation:floatLogo 6s ease-in-out infinite;
}

@keyframes floatLogo{
50%{transform:translateY(-10px)}
}

.primary-btn{
padding:16px 56px;
border:none;
border-radius:50px;
background:#39ff14;
color:#000;
font-weight:600;
letter-spacing:2.5px;
cursor:pointer;
}

/* PRODUCTS */

.products{
padding:140px 10%;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:60px;
max-width:1000px;
margin:0 auto;
}

.product{
background:#111;
border-radius:22px;
padding:40px 30px;
text-align:center;
transition:.35s;
}

.product:hover{
transform:translateY(-12px);
box-shadow:0 0 35px rgba(57,255,20,.25);
}

.product-image{
position:relative;
height:260px;
display:flex;
align-items:center;
justify-content:center;
}

.product-image img{
max-width:100%;
max-height:100%;
border-radius:14px;
cursor:pointer;
}

/* ZOOM */

.zoom{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
}

.zoom.show{
opacity:1;
pointer-events:auto;
}

.zoom img{
max-width:90%;
max-height:90%;
transform:scale(.9);
transition:.3s;
}

.zoom.show img{
transform:scale(1);
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="loader" id="loader">
<img src="logo.png">
</div>

<div class="burger" id="burger" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<nav class="side-menu" id="menu">

<div class="menu-main">
<a onclick="toggleMenu()">HOME</a>
<a onclick="toggleMenu()">PRODUCTS</a>
<a onclick="toggleMenu()">CONTACT</a>
<a onclick="openSocials()">SOCIALS</a>
<a href="https://www.paypal.me/TopTierExotics" target="_blank">PAYPAL</a>
</div>

<div class="menu-socials">
<a onclick="closeSocials()">← BACK</a>
<a href="https://t.me/TTE_V2" target="_blank">TELEGRAM</a>
<a href="https://www.instagram.com/toptierexotics.2k25" target="_blank">INSTAGRAM</a>
</div>

</nav>

<section class="hero">
<img src="logo.png" class="hero-logo">
<button class="primary-btn">SHOP COLLECTION</button>
</section>

<section class="products">

<div class="product-grid">

<article class="product">
<div class="product-image">
<img src="hat.png" id="hatImage">
</div>
<h3>TOPTIEREXOTICS HAT</h3>
<p>Structured fit. Breathable fabric.</p>
<button class="primary-btn">ORDER</button>
</article>

<article class="product">
<div class="product-image">
<img src="tracksuit.png" id="tracksuitImage">
</div>
<h3>TOPTIEREXOTICS TRACKSUIT</h3>
<p>Premium hoodie and joggers.</p>
<button class="primary-btn">ORDER</button>
</article>

</div>

</section>

<div class="zoom" id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* LOADER */
window.onload=()=>setTimeout(()=>loader.style.display="none",800);

/* MENU */
function toggleMenu(){
menu.classList.toggle('active');
burger.classList.toggle('active');
}

function openSocials(){
menu.classList.add("social-open");
}

function closeSocials(){
menu.classList.remove("social-open");
}

/* CURSOR (DESKTOP ONLY) */

const cursor=document.getElementById("cursor");

if(!('ontouchstart' in window)){
cursor.style.opacity=1;

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});
}

/* ZOOM */

hatImage.onclick=openZoom;
tracksuitImage.onclick=openZoom;

function openZoom(e){
zoomImg.src=e.target.src;
zoom.classList.add("show");
}

function closeZoom(){
zoom.classList.remove("show");
}

</script>

</body>
</html>
